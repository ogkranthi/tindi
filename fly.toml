# fly.toml app configuration file generated for tindi on 2026-06-15T17:40:01Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tindi'
primary_region = 'ams'

[build]

[env]
  OPENROUTER_MODEL = 'anthropic/claude-sonnet-4.6'
  PORT = '3000'
  TINDI_DB_PATH = '/data/tindi.db'

[[mounts]]
  source = 'tindi_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
